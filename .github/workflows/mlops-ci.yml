name: MLOps CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:

  # ── Stage 1: Code Quality Gates ──────────────────────────────
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint & type-check tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8==6.1.0 black==23.9.1 mypy==1.5.1

      - name: Flake8 linting
        run: python -m flake8 --max-line-length=120 kafka/ scripts/ airflow/

      - name: Black formatting check
        run: python -m black --check kafka/ scripts/ airflow/

      - name: MyPy type checking
        run: python -m mypy --ignore-missing-imports kafka/ scripts/


  # ── Stage 2: Unit Tests ─────────────────────────────────────
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install pytest pytest-cov
          pip install numpy pandas
          pip install python-dateutil pytz
          pip install kafka-python-ng
          pip install pydantic

      - name: Run tests with coverage
        run: python -m pytest tests/ -v --cov=. --cov-report=term-missing

      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: .coverage


  # ── Stage 3: Notebook Syntax Validation ─────────────────────
  notebook-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate notebook Python syntax
        run: |
          for nb in databricks/notebooks/*.py; do
            python3 -c "import ast; _l=[l for l in open('$nb') if not l.startswith('# MAGIC') and not l.startswith('# DBTITLE') and l.strip()!='# COMMAND ----------' and not l.startswith('# Databricks notebook')]; ast.parse(''.join(_l)); print(f'  $nb - syntax OK')"
          done
          echo "All notebooks syntactically valid"


  # ── Stage 4: Model Quality Gate (main branch only) ──────────
  model-quality-gate:
    runs-on: ubuntu-latest
    needs: [code-quality, unit-tests]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ML validation deps
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install numpy pandas pytest

      - name: Run model quality gates
        run: python -m pytest tests/test_synthetic_data.py::TestDataGeneration tests/test_synthetic_data.py::TestFeatureTargetRelationship tests/test_synthetic_data.py::TestReproducibility -v --tb=short

      - name: Quality gate status
        if: success()
        run: echo "Model quality gate passed - ready for registry"
